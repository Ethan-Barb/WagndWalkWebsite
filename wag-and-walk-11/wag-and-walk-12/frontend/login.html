<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In — Wag & Walk</title>
  <link rel="stylesheet" href="/css/styles.css">
  <meta property="og:title" content="Log In — Wag & Walk">
  <meta property="og:description" content="Sign in to manage your dog walks in Naperville.">
</head>
<body>
<div class="auth-page">
  <div class="auth-visual">
    <div class="auth-visual-content">
      <h2>Welcome back</h2>
      <p>Log in to manage walks, view schedules, and connect with your community.</p>
    </div>
  </div>
  <div class="auth-form-wrap">
    <a href="/" class="logo" style="margin-bottom:36px;">
      <span class="logo-mark"><svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg"><g transform="translate(40,40)"><rect x="-14" y="-5" width="28" height="10" rx="3" fill="currentColor"/><circle cx="-14" cy="-5" r="5.5" fill="currentColor"/><circle cx="-14" cy="5" r="5.5" fill="currentColor"/><circle cx="14" cy="-5" r="5.5" fill="currentColor"/><circle cx="14" cy="5" r="5.5" fill="currentColor"/></g></svg></span>
      Wag & Walk
    </a>
    <h1>Log in to your account</h1>
    <p class="subtitle">Enter your email and password to continue.</p>
    <div id="alert-box"></div>
    <form id="login-form" style="animation:fadeUp .4s var(--ease) .2s both;">
      <div class="form-group"><label>Email</label><input type="email" id="email" placeholder="you@example.com" required autocomplete="email"></div>
      <div class="form-group"><label>Password</label><input type="password" id="password" placeholder="Your password" required autocomplete="current-password"></div>
      <label style="display:flex;align-items:center;gap:8px;margin:12px 0 4px;cursor:pointer;font-size:.82rem;color:var(--ink-muted);">
        <input type="checkbox" id="remember-me" checked style="width:16px;height:16px;accent-color:var(--accent);">
        Remember me for 30 days
      </label>
      <button type="submit" class="btn btn-primary btn-full btn-lg" id="submit-btn" style="margin-top:12px;">Log In</button>
    </form>
    <div class="auth-footer">Don't have an account? <a href="/register">Create one</a></div>
  </div>
</div>
<script>
document.getElementById('login-form').addEventListener('submit', async e => {
  e.preventDefault();
  const btn = document.getElementById('submit-btn');
  btn.textContent = 'Signing in...'; btn.disabled = true;
  try {
    const res = await fetch('/api/auth/login', { method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email: document.getElementById('email').value,
        password: document.getElementById('password').value,
        rememberMe: document.getElementById('remember-me').checked
      })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Login failed');
    localStorage.setItem('token', data.token);
    localStorage.setItem('user', JSON.stringify(data.user));
    const r = data.user.role;
    location.href = r === 'admin' ? '/dashboard/admin' : r === 'walker' ? '/dashboard/walker' : '/dashboard/client';
  } catch (err) {
    document.getElementById('alert-box').innerHTML = '<div class="alert alert-error">' + err.message + '</div>';
    btn.textContent = 'Log In'; btn.disabled = false;
  }
});
</script>
</body>
</html>
