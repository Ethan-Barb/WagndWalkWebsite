<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account — Wag & Walk</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-visual" style="background-image:url('https://images.unsplash.com/photo-1548199973-03cce0bbc87b?w=800&q=80')">
    <div class="auth-visual-content">
      <h2>Join the community</h2>
      <p>Connect with Naperville's dog walking community. Book walks or start earning.</p>
    </div>
  </div>
  <div class="auth-form-wrap" style="max-width:540px;">
    <a href="/" class="logo" style="margin-bottom:28px;">
      <span class="logo-mark"><svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg"><g transform="translate(40,40)"><rect x="-14" y="-5" width="28" height="10" rx="3" fill="currentColor"/><circle cx="-14" cy="-5" r="5.5" fill="currentColor"/><circle cx="-14" cy="5" r="5.5" fill="currentColor"/><circle cx="14" cy="-5" r="5.5" fill="currentColor"/><circle cx="14" cy="5" r="5.5" fill="currentColor"/></g></svg></span>
      Wag & Walk
    </a>
    <h1>Create your account</h1>
    <p class="subtitle">Choose your role and fill in your details.</p>
    <div class="role-grid" style="animation:fadeUp .35s var(--ease) .1s both;">
      <div class="role-card active" id="card-client" onclick="setRole('client')"><h4>Dog Owner</h4><p>Book walks for my dog</p></div>
      <div class="role-card" id="card-walker" onclick="setRole('walker')"><h4>Walker</h4><p>Earn money walking dogs</p></div>
    </div>
    <div id="alert-box"></div>
    <form id="reg-form" style="animation:fadeUp .35s var(--ease) .18s both;">
      <input type="hidden" id="role" value="client">
      <div class="form-row">
        <div class="form-group"><label>First Name</label><input type="text" id="firstName" placeholder="Jane" required></div>
        <div class="form-group"><label>Last Name</label><input type="text" id="lastName" placeholder="Smith" required></div>
      </div>
      <div class="form-group"><label>Email</label><input type="email" id="email" placeholder="you@example.com" required></div>
      <div class="form-group"><label>Phone</label><input type="tel" id="phone" placeholder="630-555-0100"></div>
      <div class="form-group"><label>Street Address</label><input type="text" id="street" placeholder="123 Main St, Naperville"></div>
      <div class="form-row">
        <div class="form-group"><label>ZIP</label><input type="text" id="zip" placeholder="60540" maxlength="5"></div>
        <div class="form-group"><label>City</label><input value="Naperville, IL" disabled style="opacity:.5"></div>
      </div>
      <div class="form-group"><label>Password</label><input type="password" id="password" placeholder="8+ characters" required minlength="8"></div>
      <div id="walker-fields" style="display:none">
        <div class="form-divider"></div>
        <div class="form-group"><label>Age</label><input type="number" id="age" min="14" max="99" placeholder="17"></div>
        <div class="form-group"><label>Bio</label><textarea id="bio" placeholder="Tell dog owners about yourself..."></textarea></div>
      </div>
      <button type="submit" class="btn btn-primary btn-full btn-lg" id="submit-btn" style="margin-top:8px;">Create Account</button>
      <div class="auth-footer mt-2">Already have an account? <a href="/login">Log in</a></div>
    </form>
  </div>
</div>
<script>
const urlRole = new URLSearchParams(location.search).get('role');
if (urlRole === 'walker') setRole('walker');
function setRole(r) {
  document.getElementById('role').value = r;
  document.getElementById('card-client').classList.toggle('active', r === 'client');
  document.getElementById('card-walker').classList.toggle('active', r === 'walker');
  document.getElementById('walker-fields').style.display = r === 'walker' ? 'block' : 'none';
}
document.getElementById('reg-form').addEventListener('submit', async e => {
  e.preventDefault();
  const btn = document.getElementById('submit-btn');
  btn.textContent = 'Creating...'; btn.disabled = true;
  const role = document.getElementById('role').value;
  const body = {
    firstName: document.getElementById('firstName').value,
    lastName: document.getElementById('lastName').value,
    email: document.getElementById('email').value,
    phone: document.getElementById('phone').value,
    password: document.getElementById('password').value,
    role,
    address: { street: document.getElementById('street').value, city: 'Naperville', state: 'IL', zip: document.getElementById('zip').value },
  };
  if (role === 'walker') body.walkerProfile = { age: parseInt(document.getElementById('age').value) || undefined, bio: document.getElementById('bio').value };
  try {
    const res = await fetch('/api/auth/register', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);
    localStorage.setItem('token', data.token);
    localStorage.setItem('user', JSON.stringify(data.user));
    location.href = role === 'walker' ? '/dashboard/walker' : '/dashboard/client';
  } catch (err) {
    document.getElementById('alert-box').innerHTML = '<div class="alert alert-error">' + err.message + '</div>';
    btn.textContent = 'Create Account'; btn.disabled = false;
  }
});
</script>
</body>
</html>
