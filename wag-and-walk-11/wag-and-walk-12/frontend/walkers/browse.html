<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Find Walkers — Wag & Walk</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<nav class="nav" id="main-nav">
  <div class="nav-inner">
    <a href="/" class="logo"><span class="logo-mark"><svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg"><g transform="translate(40,40)"><rect x="-14" y="-5" width="28" height="10" rx="3" fill="currentColor"/><circle cx="-14" cy="-5" r="5.5" fill="currentColor"/><circle cx="-14" cy="5" r="5.5" fill="currentColor"/><circle cx="14" cy="-5" r="5.5" fill="currentColor"/><circle cx="14" cy="5" r="5.5" fill="currentColor"/></g></svg></span> Wag & Walk</a>
    <div class="nav-links" id="nav-links">
      <a href="/walkers" style="color:var(--ink);font-weight:600;">Find Walkers</a>
      <a href="/about">About</a>
      <a href="/login">Log In</a>
      <a href="/register" class="nav-cta">Get Started</a>
    </div>
    <button class="nav-toggle" onclick="document.getElementById('nav-links').classList.toggle('open')"><svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M3 5h14M3 10h14M3 15h14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg></button>
  </div>
</nav>

<section class="section" style="padding-top:48px;">
  <div class="section-inner">
    <div class="section-eyebrow" style="animation:fadeUp .4s var(--ease) .1s both;">Naperville walkers</div>
    <h2 class="section-title" style="animation:fadeUp .4s var(--ease) .18s both;max-width:none;">Meet our trusted walkers</h2>
    <div class="filter-bar" style="animation:fadeUp .4s var(--ease) .25s both;">
      <input type="text" id="search" placeholder="Search by name..." oninput="filter()" style="flex:1;max-width:280px;">
      <select id="rating-filter" onchange="filter()">
        <option value="">All ratings</option>
        <option value="4.5">4.5+ stars</option>
        <option value="4">4+ stars</option>
      </select>
    </div>
    <div id="walker-list"><div class="spinner"></div></div>
  </div>
</section>

<footer class="footer">
  <div class="footer-bottom"><p>&copy; 2025 Wag & Walk. Naperville, Illinois.</p></div>
</footer>

<script src="/js/auth.js"></script>
<script>
initAnimations();
let walkers = [];
const photos = [
  'https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=400&q=80',
  'https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=400&q=80',
  'https://images.unsplash.com/photo-1438761681033-6461ffad8d80?w=400&q=80',
];

async function load() {
  try {
    const res = await fetch('/api/walkers?available=true');
    const data = await res.json();
    walkers = data.walkers || [];
    render(walkers);
  } catch (e) { document.getElementById('walker-list').innerHTML = '<p class="text-muted">Unable to load walkers.</p>'; }
}

function render(list) {
  const el = document.getElementById('walker-list');
  if (!list.length) { el.innerHTML = '<div class="empty-state"><div class="empty-state-icon">?</div><h3>No walkers found</h3><p>Try adjusting your search or check back later.</p></div>'; return; }
  el.innerHTML = '<div class="walker-grid">' + list.map((w, i) => {
    const wp = w.walkerProfile || {};
    const ini = (w.firstName?.[0] || '') + (w.lastName?.[0] || '');
    const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    const avail = (wp.availability || []).map(a => days[a.dayOfWeek]).join(', ');
    return '<div class="walker-card reveal-scale" style="transition-delay:' + (i * .06) + 's"><img class="walker-card-img" src="' + (w.profilePhoto || photos[i % 3]) + '" alt="' + w.firstName + '" loading="lazy" onerror="this.style.background=\'var(--bg-warm)\'">' +
    '<div class="walker-card-body"><h3>' + w.firstName + ' ' + w.lastName + '</h3>' +
    '<div class="walker-rating">' + (wp.averageRating || 0).toFixed(1) + ' rating · ' + (wp.totalWalks || 0) + ' walks</div>' +
    '<p class="walker-bio">' + (wp.bio || 'Passionate dog walker in Naperville.') + '</p>' +
    (avail ? '<p style="font-size:.72rem;color:var(--sage);margin-bottom:12px;">Available: ' + avail + '</p>' : '') +
    '<a href="/register?role=client" class="btn btn-primary btn-sm btn-full">Book ' + w.firstName + '</a></div></div>';
  }).join('') + '</div>';
  initScrollReveal();
}

function filter() {
  const q = document.getElementById('search').value.toLowerCase();
  const r = parseFloat(document.getElementById('rating-filter').value) || 0;
  render(walkers.filter(w => {
    const name = (w.firstName + ' ' + w.lastName).toLowerCase();
    const bio = (w.walkerProfile?.bio || '').toLowerCase();
    return (!q || name.includes(q) || bio.includes(q)) && (w.walkerProfile?.averageRating || 0) >= r;
  }));
}
load();
</script>
</body>
</html>
