<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard — Wag &amp; Walk</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

<button class="sidebar-toggle" onclick="toggleSidebar()">☰ Menu</button>
<div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>

<div class="dash-layout">
  <aside class="sidebar" id="sidebar"></aside>

  <main class="dash-main">
    <div class="dash-header">
      <div><h1>Admin Dashboard</h1><p class="welcome">Platform overview &amp; management</p></div>
      <span class="badge badge-admin">👑 Admin</span>
    </div>

    <!-- ── Overview ─────────────────────────── -->
    <div id="section-overview">
      <div class="stat-cards" id="stat-cards"><div class="spinner"></div></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">
        <div class="card">
          <div class="card-header"><h3>Recent Bookings</h3></div>
          <div class="card-body table-wrap" id="recent-bookings"><div class="spinner"></div></div>
        </div>
        <div class="card">
          <div class="card-header"><h3>Recent Users</h3></div>
          <div class="card-body table-wrap" id="recent-users"><div class="spinner"></div></div>
        </div>
      </div>
    </div>

    <!-- ── Users ────────────────────────────── -->
    <div id="section-users" style="display:none">
      <h2 class="mb-2">User Management</h2>
      <div class="filter-bar">
        <input type="text" id="user-search" placeholder="Search by name or email…" oninput="loadUsers()">
        <select id="user-role-filter" onchange="loadUsers()">
          <option value="">All Roles</option><option value="client">Clients</option><option value="walker">Walkers</option><option value="admin">Admins</option>
        </select>
        <select id="user-active-filter" onchange="loadUsers()">
          <option value="">All Status</option><option value="true">Active</option><option value="false">Deactivated</option>
        </select>
      </div>
      <div class="card">
        <div class="card-body table-wrap" id="users-table"><div class="spinner"></div></div>
      </div>
      <div id="users-pagination" class="pagination"></div>
    </div>

    <!-- ── Bookings ─────────────────────────── -->
    <div id="section-bookings" style="display:none">
      <h2 class="mb-2">Booking Management</h2>
      <div class="filter-bar">
        <select id="booking-status-filter" onchange="loadAdminBookings()">
          <option value="">All Statuses</option><option value="pending">Pending</option><option value="accepted">Accepted</option>
          <option value="completed">Completed</option><option value="cancelled">Cancelled</option><option value="declined">Declined</option>
        </select>
        <input type="date" id="booking-date-filter" onchange="loadAdminBookings()">
      </div>
      <div class="card">
        <div class="card-body table-wrap" id="bookings-table"><div class="spinner"></div></div>
      </div>
      <div id="bookings-pagination" class="pagination"></div>
    </div>

    <!-- ── Payments ─────────────────────────── -->
    <div id="section-payments" style="display:none">
      <h2 class="mb-2">Payment Overview</h2>
      <div class="stat-cards" id="payment-stats"></div>
    </div>

    <!-- ── Analytics ────────────────────────── -->
    <div id="section-analytics" style="display:none">
      <h2 class="mb-2">Analytics</h2>
      <div class="stat-cards" id="analytics-top-walkers"></div>
      <div class="card">
        <div class="card-header"><h3>Monthly Revenue</h3></div>
        <div class="card-body" id="revenue-chart"></div>
      </div>
      <div class="card">
        <div class="card-header"><h3>Daily Bookings (30 days)</h3></div>
        <div class="card-body" id="daily-chart"></div>
      </div>
    </div>

  </main>
</div>

<script src="/js/auth.js"></script>
<script src="/js/dashboard.js"></script>
<script>
  if (!requireAuth(['admin'])) throw 'redirect';
  renderDashNav('sidebar');
  initSectionRouter(['overview', 'users', 'bookings', 'payments', 'analytics']);

  let usersPage = 1, bookingsPage = 1;

  loadAdminDashboard();
  loadUsers();
  loadAdminBookings();
  loadAnalytics();

  async function loadAdminDashboard() {
    try {
      const data = await api('/admin/dashboard');
      const us = data.userStats || {};
      const bs = data.bookingStats || {};
      const rs = data.revenueStats || {};

      document.getElementById('stat-cards').innerHTML = `
        <div class="stat-card"><div class="icon">👥</div><div class="label">Clients</div><div class="value">${us.totalClients||0}</div></div>
        <div class="stat-card"><div class="icon">🦮</div><div class="label">Walkers</div><div class="value">${us.totalWalkers||0}</div></div>
        <div class="stat-card"><div class="icon">📅</div><div class="label">Total Bookings</div><div class="value">${bs.totalBookings||0}</div><div class="sub">${bs.pendingBookings||0} pending</div></div>
        <div class="stat-card"><div class="icon">💰</div><div class="label">Total Revenue</div><div class="value">${formatCents(rs.totalRevenue||0)}</div><div class="sub">Platform: ${formatCents(rs.platformRevenue||0)}</div></div>
      `;

      // Payment stats (reuse on payments tab)
      document.getElementById('payment-stats').innerHTML = `
        <div class="stat-card"><div class="label">Gross Revenue</div><div class="value">${formatCents(rs.totalRevenue||0)}</div></div>
        <div class="stat-card"><div class="label">Platform Fee (20%)</div><div class="value">${formatCents(rs.platformRevenue||0)}</div></div>
        <div class="stat-card"><div class="label">Walker Payouts (80%)</div><div class="value">${formatCents((rs.totalRevenue||0) - (rs.platformRevenue||0))}</div></div>
        <div class="stat-card"><div class="label">Total Tips</div><div class="value">${formatCents(rs.totalTips||0)}</div></div>
      `;

      // Recent bookings
      const rb = data.recentBookings || [];
      document.getElementById('recent-bookings').innerHTML = rb.length ? `<table><thead><tr><th>Date</th><th>Client</th><th>Walker</th><th>Status</th></tr></thead><tbody>
        ${rb.map(b => `<tr>
          <td>${formatDate(b.scheduledDate)}</td>
          <td>${b.client?.firstName || '?'} ${b.client?.lastName || ''}</td>
          <td>${b.walker?.firstName || 'Unassigned'}</td>
          <td>${statusBadge(b.status)}</td>
        </tr>`).join('')}</tbody></table>` : '<p class="text-muted">No bookings yet.</p>';

      // Recent users
      const ru = data.recentUsers || [];
      document.getElementById('recent-users').innerHTML = ru.length ? `<table><thead><tr><th>Name</th><th>Role</th><th>Joined</th></tr></thead><tbody>
        ${ru.map(u => `<tr>
          <td>${u.firstName} ${u.lastName}</td>
          <td><span class="badge badge-${u.role}">${u.role}</span></td>
          <td>${formatDate(u.createdAt)}</td>
        </tr>`).join('')}</tbody></table>` : '<p class="text-muted">No users yet.</p>';
    } catch (err) { showToast(err.message, 'error'); }
  }

  // ── Users ─────────────────────────────────────
  async function loadUsers() {
    const search = document.getElementById('user-search')?.value || '';
    const role = document.getElementById('user-role-filter')?.value || '';
    const isActive = document.getElementById('user-active-filter')?.value || '';

    let url = `/admin/users?page=${usersPage}&limit=15`;
    if (search) url += `&search=${encodeURIComponent(search)}`;
    if (role) url += `&role=${role}`;
    if (isActive) url += `&isActive=${isActive}`;

    try {
      const data = await api(url);
      const users = data.users || [];
      const el = document.getElementById('users-table');

      el.innerHTML = users.length ? `<table><thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Status</th><th>Actions</th></tr></thead><tbody>
        ${users.map(u => `<tr>
          <td>${u.firstName} ${u.lastName}</td>
          <td>${u.email}</td>
          <td><span class="badge badge-${u.role}">${u.role}</span></td>
          <td>${u.isActive ? '<span class="badge badge-completed">Active</span>' : '<span class="badge badge-cancelled">Inactive</span>'}</td>
          <td>
            <button class="btn btn-ghost btn-sm" onclick="toggleUserActive('${u._id}', ${!u.isActive})">${u.isActive ? 'Deactivate' : 'Activate'}</button>
          </td>
        </tr>`).join('')}</tbody></table>` : '<p class="text-muted">No users found.</p>';

      // Pagination
      renderPagination('users-pagination', data.page, data.pages, (p) => { usersPage = p; loadUsers(); });
    } catch (err) { showToast(err.message, 'error'); }
  }

  async function toggleUserActive(id, isActive) {
    try {
      await api(`/admin/users/${id}`, { method: 'PATCH', body: { isActive } });
      showToast(`User ${isActive ? 'activated' : 'deactivated'}`, 'success');
      loadUsers();
    } catch (err) { showToast(err.message, 'error'); }
  }

  // ── Bookings ──────────────────────────────────
  async function loadAdminBookings() {
    const status = document.getElementById('booking-status-filter')?.value || '';
    const date = document.getElementById('booking-date-filter')?.value || '';

    let url = `/admin/bookings?page=${bookingsPage}&limit=15`;
    if (status) url += `&status=${status}`;
    if (date) url += `&date=${date}`;

    try {
      const data = await api(url);
      const bookings = data.bookings || [];
      const el = document.getElementById('bookings-table');

      el.innerHTML = bookings.length ? `<table><thead><tr><th>Date</th><th>Client</th><th>Walker</th><th>Dogs</th><th>Status</th><th>Price</th><th>Actions</th></tr></thead><tbody>
        ${bookings.map(b => `<tr>
          <td>${formatDate(b.scheduledDate)}<br><span class="text-xs">${formatTime(b.startTime)}</span></td>
          <td>${b.client?.firstName || '?'} ${b.client?.lastName || ''}</td>
          <td>${b.walker?.firstName || 'None'} ${b.walker?.lastName || ''}</td>
          <td>${(b.dogs||[]).map(d => d.name).join(', ')}</td>
          <td>${statusBadge(b.status)}</td>
          <td>${formatCents(b.totalPrice)}</td>
          <td>
            ${b.status === 'pending' ? `<button class="btn btn-ghost btn-sm" onclick="adminCancelBooking('${b._id}')">Cancel</button>` : ''}
            ${b.status === 'pending' ? `<button class="btn btn-ghost btn-sm" onclick="adminAcceptBooking('${b._id}')">Accept</button>` : ''}
          </td>
        </tr>`).join('')}</tbody></table>` : '<p class="text-muted">No bookings found.</p>';

      renderPagination('bookings-pagination', data.page, data.pages, (p) => { bookingsPage = p; loadAdminBookings(); });
    } catch (err) { showToast(err.message, 'error'); }
  }

  async function adminCancelBooking(id) {
    if (!confirmAction('Cancel this booking?')) return;
    try {
      await api(`/admin/bookings/${id}`, { method: 'DELETE', body: { reason: 'Admin cancelled' } });
      showToast('Booking cancelled', 'success');
      loadAdminBookings();
      loadAdminDashboard();
    } catch (err) { showToast(err.message, 'error'); }
  }

  async function adminAcceptBooking(id) {
    try {
      await api(`/admin/bookings/${id}`, { method: 'PATCH', body: { status: 'accepted' } });
      showToast('Booking accepted', 'success');
      loadAdminBookings();
    } catch (err) { showToast(err.message, 'error'); }
  }

  // ── Analytics ─────────────────────────────────
  async function loadAnalytics() {
    try {
      const data = await api('/admin/analytics');

      // Top walkers
      const tw = data.topWalkers || [];
      document.getElementById('analytics-top-walkers').innerHTML = tw.length
        ? tw.slice(0, 5).map((w, i) => `
          <div class="stat-card">
            <div class="label">#${i+1} ${w.firstName} ${w.lastName}</div>
            <div class="value">${w.walkerProfile?.totalWalks || 0} walks</div>
            <div class="sub">⭐ ${(w.walkerProfile?.averageRating || 0).toFixed(1)} · Earned: ${formatCents(w.walkerProfile?.totalEarnings || 0)}</div>
          </div>`).join('')
        : '<p class="text-muted">No walker data yet.</p>';

      // Revenue by month
      const rbm = data.revenueByMonth || [];
      document.getElementById('revenue-chart').innerHTML = rbm.length
        ? `<table><thead><tr><th>Month</th><th>Walks</th><th>Revenue</th><th>Tips</th></tr></thead><tbody>
          ${rbm.map(r => `<tr><td>${r._id}</td><td>${r.walks}</td><td>${formatCents(r.revenue)}</td><td>${formatCents(r.tips)}</td></tr>`).join('')}
          </tbody></table>`
        : '<p class="text-muted">No revenue data yet.</p>';

      // Daily bookings
      const db = data.dailyBookings || [];
      document.getElementById('daily-chart').innerHTML = db.length
        ? `<div style="display:flex;gap:3px;align-items:flex-end;height:120px;padding-top:10px;">
          ${db.map(d => {
            const maxCount = Math.max(...db.map(x => x.count), 1);
            const h = Math.max(8, (d.count / maxCount) * 100);
            return `<div style="flex:1;background:var(--amber);border-radius:4px 4px 0 0;height:${h}px;position:relative;" title="${d._id}: ${d.count} bookings">
              <span style="position:absolute;top:-18px;left:50%;transform:translateX(-50%);font-size:.65rem;color:var(--muted);">${d.count}</span>
            </div>`;
          }).join('')}
          </div>
          <div style="display:flex;gap:3px;margin-top:4px;">
          ${db.map(d => `<div style="flex:1;text-align:center;font-size:.55rem;color:var(--muted);">${d._id.slice(5)}</div>`).join('')}
          </div>`
        : '<p class="text-muted">No booking data yet.</p>';
    } catch (err) { showToast(err.message, 'error'); }
  }

  // ── Pagination helper ─────────────────────────
  function renderPagination(containerId, current, total, onPage) {
    const el = document.getElementById(containerId);
    if (total <= 1) { el.innerHTML = ''; return; }
    let html = '';
    html += `<button ${current <= 1 ? 'disabled' : ''} onclick="this._fn(${current-1})">‹</button>`;
    for (let p = 1; p <= total; p++) {
      html += `<button class="${p === current ? 'active' : ''}" onclick="this._fn(${p})">${p}</button>`;
    }
    html += `<button ${current >= total ? 'disabled' : ''} onclick="this._fn(${current+1})">›</button>`;
    el.innerHTML = html;
    el.querySelectorAll('button').forEach(btn => btn._fn = onPage);
  }
</script>
</body>
</html>
