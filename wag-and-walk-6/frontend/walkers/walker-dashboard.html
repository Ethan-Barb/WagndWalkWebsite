<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Walker Dashboard — Wag &amp; Walk</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

<button class="sidebar-toggle" onclick="toggleSidebar()">☰ Menu</button>
<div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>

<div class="dash-layout">
  <aside class="sidebar" id="sidebar"></aside>

  <main class="dash-main">
    <div class="dash-header">
      <div><h1 id="greeting">Walker Dashboard</h1><p class="welcome" id="welcome-text"></p></div>
      <span class="badge badge-accepted" id="avail-badge">Available</span>
    </div>

    <!-- ── Overview ─────────────────────────── -->
    <div id="section-overview">
      <div class="stat-cards" id="stat-cards"></div>

      <div class="card">
        <div class="card-header"><h3>⏳ Pending Requests</h3></div>
        <div class="card-body" id="pending-walks"><div class="spinner"></div></div>
      </div>

      <div class="card">
        <div class="card-header"><h3>📅 Upcoming Walks</h3></div>
        <div class="card-body" id="upcoming-walks"><div class="spinner"></div></div>
      </div>

      <div class="card">
        <div class="card-header"><h3>✅ Recent Walks</h3></div>
        <div class="card-body" id="recent-walks"><div class="spinner"></div></div>
      </div>
    </div>

    <!-- ── Schedule ─────────────────────────── -->
    <div id="section-schedule" style="display:none">
      <h2 class="mb-2">My Schedule</h2>
      <div class="card">
        <div class="card-header"><h3>Availability</h3></div>
        <div class="card-body">
          <div class="avail-grid" id="avail-display"></div>
        </div>
      </div>
      <div class="card">
        <div class="card-header"><h3>All My Bookings</h3></div>
        <div class="card-body" id="all-bookings"><div class="spinner"></div></div>
      </div>
    </div>

    <!-- ── Earnings ─────────────────────────── -->
    <div id="section-earnings" style="display:none">
      <h2 class="mb-2">Earnings</h2>
      <div class="filter-bar">
        <select id="earnings-month" onchange="loadEarnings()">
          <option value="1">January</option><option value="2">February</option><option value="3">March</option>
          <option value="4">April</option><option value="5">May</option><option value="6">June</option>
          <option value="7">July</option><option value="8">August</option><option value="9">September</option>
          <option value="10">October</option><option value="11">November</option><option value="12">December</option>
        </select>
        <select id="earnings-year" onchange="loadEarnings()"></select>
      </div>
      <div class="stat-cards" id="earnings-stats"></div>
      <div class="card">
        <div class="card-header"><h3>Completed Walks</h3></div>
        <div class="card-body table-wrap" id="earnings-table"><div class="spinner"></div></div>
      </div>
    </div>

    <!-- ── Profile ──────────────────────────── -->
    <div id="section-profile" style="display:none">
      <h2 class="mb-2">My Walker Profile</h2>
      <div class="card">
        <div class="card-body">
          <div class="form-group"><label>Bio</label><textarea id="prof-bio" rows="3"></textarea></div>
          <div class="form-group"><label>Experience</label><textarea id="prof-experience" rows="2"></textarea></div>
          <div class="form-row">
            <div class="form-group">
              <label>Available?</label>
              <select id="prof-available"><option value="true">Yes — I'm taking walks</option><option value="false">No — Pause new requests</option></select>
            </div>
            <div class="form-group"><label>Service Radius (miles)</label><input type="number" id="prof-radius" min="1" max="20"></div>
          </div>

          <h3 class="mt-3 mb-2" style="font-size:1rem;">Weekly Availability</h3>
          <div id="avail-editor"></div>

          <div class="flex gap-1 mt-3">
            <button class="btn btn-primary btn-sm" onclick="saveProfile()">Save Profile</button>
            <button class="btn btn-secondary btn-sm" onclick="initStripeConnect()">💳 Connect Stripe</button>
          </div>
        </div>
      </div>
    </div>

  </main>
</div>

<script src="/js/auth.js"></script>
<script src="/js/booking.js"></script>
<script src="/js/tips.js"></script>
<script src="/js/payments.js"></script>
<script src="/js/dashboard.js"></script>
<script>
  if (!requireAuth(['walker'])) throw 'redirect';
  const user = getUser();
  const wp = user.walkerProfile || {};

  renderDashNav('sidebar');
  initSectionRouter(['overview', 'schedule', 'earnings', 'profile']);

  document.getElementById('greeting').textContent = `Hey, ${user.firstName}!`;
  document.getElementById('welcome-text').textContent = `⭐ ${(wp.averageRating||0).toFixed(1)} rating · ${wp.totalWalks||0} walks`;
  document.getElementById('avail-badge').textContent = wp.isAvailable ? 'Available' : 'Paused';
  document.getElementById('avail-badge').className = `badge ${wp.isAvailable ? 'badge-accepted' : 'badge-cancelled'}`;

  // Set earnings month/year defaults
  const now = new Date();
  document.getElementById('earnings-month').value = now.getMonth() + 1;
  const yearSel = document.getElementById('earnings-year');
  for (let y = now.getFullYear(); y >= now.getFullYear() - 2; y--) {
    yearSel.innerHTML += `<option value="${y}">${y}</option>`;
  }

  loadWalkerDashboard();
  loadEarnings();
  loadAllBookings();
  initProfileForm();
  renderAvailDisplay();

  async function loadWalkerDashboard() {
    try {
      const data = await api('/walkers/dashboard');
      const w = data.walker?.walkerProfile || wp;

      document.getElementById('stat-cards').innerHTML = `
        <div class="stat-card"><div class="icon">📅</div><div class="label">Upcoming</div><div class="value">${(data.upcomingWalks||[]).length}</div></div>
        <div class="stat-card"><div class="icon">⏳</div><div class="label">Pending</div><div class="value">${(data.pendingWalks||[]).length}</div></div>
        <div class="stat-card"><div class="icon">💰</div><div class="label">Total Earned</div><div class="value">${formatCents(w.totalEarnings||0)}</div></div>
        <div class="stat-card"><div class="icon">💸</div><div class="label">Tips</div><div class="value">${formatCents(w.totalTips||0)}</div></div>
      `;

      renderWalkerBookings('pending-walks', data.pendingWalks || [], 'pending');
      renderWalkerBookings('upcoming-walks', data.upcomingWalks || [], 'upcoming');
      renderWalkerBookings('recent-walks', data.recentWalks || [], 'recent');
    } catch (err) { showToast(err.message, 'error'); }
  }

  function renderWalkerBookings(containerId, bookings, type) {
    const el = document.getElementById(containerId);
    if (!bookings.length) {
      const msgs = { pending: 'No pending requests', upcoming: 'No upcoming walks', recent: 'No recent walks' };
      el.innerHTML = `<div class="empty-state"><p>${msgs[type]}</p></div>`;
      return;
    }
    el.innerHTML = bookings.map(b => {
      const clientName = b.client ? `${b.client.firstName} ${b.client.lastName}` : 'Unknown';
      const dogNames = (b.dogs || []).map(d => `${d.name} (${d.size})`).join(', ');
      const dogInstr = (b.dogs || []).filter(d => d.specialInstructions).map(d => `${d.name}: ${d.specialInstructions}`).join('; ');
      return `
        <div class="booking-card">
          <div class="booking-card-header"><h4>${clientName}</h4>${statusBadge(b.status)}</div>
          <div class="booking-meta">
            <span>📅 ${formatDate(b.scheduledDate)}</span>
            <span>🕐 ${formatTime(b.startTime)} – ${formatTime(b.endTime)}</span>
            <span>💰 ${formatCents(b.totalPrice)}</span>
          </div>
          <div class="booking-dogs">${(b.dogs||[]).map(d => `<span class="dog-tag">🐕 ${d.name} · ${d.size}</span>`).join('')}</div>
          ${dogInstr ? `<div class="text-sm text-muted mt-1">📝 ${dogInstr}</div>` : ''}
          ${b.tipAmount ? `<div class="text-sm mt-1">💸 Tip received: ${formatCents(b.tipAmount)}</div>` : ''}
          ${b.review?.rating ? `<div class="text-sm mt-1"><span class="review-stars">${starRating(b.review.rating)}</span> "${b.review.comment || ''}"</div>` : ''}
          <div class="booking-actions">
            ${type === 'pending' ? `
              <button class="btn btn-sm btn-success" onclick="acceptBooking('${b._id}')">✓ Accept</button>
              <button class="btn btn-sm btn-danger" onclick="declineBooking('${b._id}')">✗ Decline</button>
            ` : ''}
            ${type === 'upcoming' ? `
              <button class="btn btn-sm btn-success" onclick="completeBooking('${b._id}')">✓ Mark Complete</button>
              <button class="btn btn-sm btn-secondary" onclick="cancelWalkerBooking('${b._id}')">Cancel</button>
            ` : ''}
          </div>
        </div>`;
    }).join('');
  }

  async function acceptBooking(id) {
    try {
      await api(`/bookings/${id}/accept`, { method: 'PATCH' });
      showToast('Booking accepted!', 'success');
      loadWalkerDashboard();
    } catch (err) { showToast(err.message, 'error'); }
  }

  async function declineBooking(id) {
    const reason = prompt('Reason for declining (optional):') || '';
    try {
      await api(`/bookings/${id}/decline`, { method: 'PATCH', body: { reason } });
      showToast('Booking declined', 'info');
      loadWalkerDashboard();
    } catch (err) { showToast(err.message, 'error'); }
  }

  async function completeBooking(id) {
    if (!confirmAction('Mark this walk as completed?')) return;
    try {
      await api(`/bookings/${id}/complete`, { method: 'PATCH' });
      showToast('Walk completed! 🎉', 'success');
      loadWalkerDashboard();
    } catch (err) { showToast(err.message, 'error'); }
  }

  async function cancelWalkerBooking(id) {
    if (!confirmAction('Cancel this booking?')) return;
    try {
      await api(`/bookings/${id}/cancel`, { method: 'PATCH', body: { reason: 'Walker cancelled' } });
      showToast('Booking cancelled', 'info');
      loadWalkerDashboard();
    } catch (err) { showToast(err.message, 'error'); }
  }

  // ── Earnings ──────────────────────────────────
  async function loadEarnings() {
    const month = document.getElementById('earnings-month').value;
    const year = document.getElementById('earnings-year').value;
    try {
      const data = await api(`/walkers/earnings?month=${month}&year=${year}`);
      const t = data.totals || {};
      document.getElementById('earnings-stats').innerHTML = `
        <div class="stat-card"><div class="label">Walks</div><div class="value">${t.walks||0}</div></div>
        <div class="stat-card"><div class="label">Gross Revenue</div><div class="value">${formatCents(t.earnings||0)}</div></div>
        <div class="stat-card"><div class="label">Your Earnings (80%)</div><div class="value">${formatCents(t.walkerEarnings||0)}</div></div>
        <div class="stat-card"><div class="label">Tips</div><div class="value">${formatCents(t.tips||0)}</div></div>
      `;

      const earnings = data.earnings || [];
      const el = document.getElementById('earnings-table');
      if (!earnings.length) { el.innerHTML = '<p class="text-muted">No completed walks this period.</p>'; return; }
      el.innerHTML = `<table><thead><tr><th>Date</th><th>Time</th><th>Price</th><th>Tip</th><th>Your Payout</th></tr></thead><tbody>
        ${earnings.map(b => `<tr>
          <td>${formatDate(b.scheduledDate)}</td><td>${formatTime(b.startTime)}</td>
          <td>${formatCents(b.totalPrice)}</td><td>${b.tipAmount ? formatCents(b.tipAmount) : '—'}</td>
          <td><strong>${formatCents(Math.round(b.totalPrice * 0.8) + (b.tipAmount || 0))}</strong></td>
        </tr>`).join('')}</tbody></table>`;
    } catch (err) { showToast(err.message, 'error'); }
  }

  // ── All bookings ──────────────────────────────
  async function loadAllBookings() {
    try {
      const data = await api('/bookings');
      renderWalkerBookings('all-bookings', data.bookings || [], 'all');
    } catch (err) { document.getElementById('all-bookings').innerHTML = '<p class="text-muted">Error loading bookings.</p>'; }
  }

  // ── Availability display ──────────────────────
  function renderAvailDisplay() {
    const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    const avail = wp.availability || [];
    const el = document.getElementById('avail-display');
    if (!el) return;
    el.innerHTML = days.map((name, i) => {
      const slots = avail.filter(a => a.dayOfWeek === i);
      const active = slots.length > 0;
      return `<div class="avail-day ${active ? 'active' : ''}">
        <div class="day-name">${name}</div>
        ${active ? slots.map(s => `<div class="day-time">${formatTime(s.startTime)} – ${formatTime(s.endTime)}</div>`).join('') : '<div class="day-time">Off</div>'}
      </div>`;
    }).join('');
  }

  // ── Profile form ──────────────────────────────
  function initProfileForm() {
    document.getElementById('prof-bio').value = wp.bio || '';
    document.getElementById('prof-experience').value = wp.experience || '';
    document.getElementById('prof-available').value = String(wp.isAvailable !== false);
    document.getElementById('prof-radius').value = wp.serviceRadius || 5;

    // Availability editor
    const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const avail = wp.availability || [];
    const editor = document.getElementById('avail-editor');
    editor.innerHTML = days.map((name, i) => {
      const slot = avail.find(a => a.dayOfWeek === i);
      return `<div style="display:flex;gap:10px;align-items:center;margin-bottom:8px;">
        <label style="width:90px;font-size:.85rem;font-weight:500;">${name}</label>
        <input type="checkbox" class="avail-cb" data-day="${i}" ${slot ? 'checked' : ''}>
        <input type="time" class="avail-start" data-day="${i}" value="${slot?.startTime || '09:00'}" style="padding:6px;border:1px solid var(--linen);border-radius:4px;">
        <span style="font-size:.8rem;">to</span>
        <input type="time" class="avail-end" data-day="${i}" value="${slot?.endTime || '17:00'}" style="padding:6px;border:1px solid var(--linen);border-radius:4px;">
      </div>`;
    }).join('');
  }

  async function saveProfile() {
    // Gather availability
    const availability = [];
    document.querySelectorAll('.avail-cb:checked').forEach(cb => {
      const day = parseInt(cb.dataset.day);
      const start = document.querySelector(`.avail-start[data-day="${day}"]`).value;
      const end = document.querySelector(`.avail-end[data-day="${day}"]`).value;
      if (start && end) availability.push({ dayOfWeek: day, startTime: start, endTime: end });
    });

    try {
      await api('/walkers/profile', { method: 'PATCH', body: {
        bio: document.getElementById('prof-bio').value,
        experience: document.getElementById('prof-experience').value,
        isAvailable: document.getElementById('prof-available').value === 'true',
        serviceRadius: parseInt(document.getElementById('prof-radius').value) || 5,
        availability,
      }});
      showToast('Profile updated!', 'success');
      // Update local storage
      const u = getUser();
      u.walkerProfile = { ...u.walkerProfile, bio: document.getElementById('prof-bio').value, availability };
      localStorage.setItem('user', JSON.stringify(u));
    } catch (err) { showToast(err.message, 'error'); }
  }
</script>
</body>
</html>
