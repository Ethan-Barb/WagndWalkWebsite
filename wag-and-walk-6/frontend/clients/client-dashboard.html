<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Dashboard — Wag &amp; Walk</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

<button class="sidebar-toggle" onclick="toggleSidebar()">☰ Menu</button>
<div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>

<div class="dash-layout">
  <aside class="sidebar" id="sidebar"></aside>

  <main class="dash-main">
    <div class="dash-header">
      <div>
        <h1 id="greeting">Dashboard</h1>
        <p class="welcome" id="welcome-text"></p>
      </div>
      <a href="#book" class="btn btn-primary btn-sm">📅 Book a Walk</a>
    </div>

    <!-- ── Overview Section ─────────────────── -->
    <div id="section-overview">
      <div class="stat-cards" id="stat-cards"></div>

      <div class="card">
        <div class="card-header"><h3>Upcoming Walks</h3></div>
        <div class="card-body" id="upcoming-bookings"><div class="spinner"></div></div>
      </div>

      <div class="card">
        <div class="card-header">
          <h3>Recent Walks</h3>
        </div>
        <div class="card-body" id="recent-bookings"><div class="spinner"></div></div>
      </div>
    </div>

    <!-- ── Dogs Section ─────────────────────── -->
    <div id="section-dogs" style="display:none">
      <div class="flex-between mb-2">
        <h2>My Dogs</h2>
        <button class="btn btn-primary btn-sm" onclick="showAddDogForm()">+ Add Dog</button>
      </div>

      <div id="add-dog-form" style="display:none" class="card">
        <div class="card-header"><h3 id="dog-form-title">Add a Dog</h3></div>
        <div class="card-body">
          <input type="hidden" id="edit-dog-id">
          <div class="form-row">
            <div class="form-group"><label>Name *</label><input id="dog-name" required></div>
            <div class="form-group"><label>Breed</label><input id="dog-breed"></div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Size *</label>
              <select id="dog-size"><option value="">Select</option><option value="small">Small</option><option value="medium">Medium</option><option value="large">Large</option><option value="xlarge">X-Large</option></select>
            </div>
            <div class="form-group"><label>Age (years)</label><input type="number" id="dog-age" min="0"></div>
          </div>
          <div class="form-row">
            <div class="form-group"><label>Weight (lbs)</label><input type="number" id="dog-weight" min="0"></div>
            <div class="form-group">
              <label>Gender</label>
              <select id="dog-gender"><option value="">Select</option><option value="male">Male</option><option value="female">Female</option></select>
            </div>
          </div>
          <div class="form-group"><label>Special Instructions</label><textarea id="dog-instructions" placeholder="Anything the walker should know…"></textarea></div>
          <div class="form-group"><label>Medical Conditions</label><input id="dog-medical" placeholder="Allergies, medications, etc."></div>
          <div class="flex gap-1">
            <button class="btn btn-primary btn-sm" onclick="saveDog()">Save Dog</button>
            <button class="btn btn-secondary btn-sm" onclick="hideAddDogForm()">Cancel</button>
          </div>
        </div>
      </div>

      <div class="dog-grid" id="dog-list"><div class="spinner"></div></div>
    </div>

    <!-- ── Book a Walk Section ──────────────── -->
    <div id="section-book" style="display:none">
      <h2 class="mb-2">Book a Walk</h2>

      <div class="card">
        <div class="card-header"><h3>Step 1 — Select Dog(s)</h3></div>
        <div class="card-body" id="booking-dog-select"><div class="spinner"></div></div>
      </div>

      <div class="card">
        <div class="card-header"><h3>Step 2 — Pick a Date</h3></div>
        <div class="card-body"><div id="booking-calendar"></div></div>
      </div>

      <div class="card">
        <div class="card-header"><h3>Step 3 — Choose a Time</h3></div>
        <div class="card-body" id="time-slots"><p class="text-muted">Select a date first.</p></div>
      </div>

      <div class="card">
        <div class="card-header"><h3>Step 4 — Choose a Walker (optional)</h3></div>
        <div class="card-body" id="walker-select"><div class="spinner"></div></div>
      </div>

      <div class="card">
        <div class="card-body" style="text-align:center">
          <p class="mb-2 text-muted" id="booking-summary"></p>
          <button class="btn btn-primary" id="book-btn" onclick="doBooking()">Confirm Booking — $20.00</button>
        </div>
      </div>
    </div>

    <!-- ── Payments Section ─────────────────── -->
    <div id="section-payments" style="display:none">
      <h2 class="mb-2">Payment History</h2>
      <div class="card">
        <div class="card-body table-wrap" id="payment-history"><div class="spinner"></div></div>
      </div>
    </div>

  </main>
</div>

<script src="/js/auth.js"></script>
<script src="/js/booking.js"></script>
<script src="/js/tips.js"></script>
<script src="/js/payments.js"></script>
<script src="/js/dashboard.js"></script>
<script>
  if (!requireAuth(['client'])) throw 'redirect';
  const user = getUser();

  renderDashNav('sidebar');
  initSectionRouter(['overview', 'dogs', 'book', 'payments']);

  document.getElementById('greeting').textContent = `Hi, ${user.firstName}!`;
  document.getElementById('welcome-text').textContent = 'Manage your dogs, bookings, and payments.';

  // ── Load dashboard data ─────────────────────
  loadDashboard();
  loadDogs();
  loadBookingDogSelect();
  initCalendar('booking-calendar');
  loadWalkers('walker-select');
  loadPaymentHistory();

  async function loadDashboard() {
    try {
      const data = await api('/clients/dashboard');
      const dogs = data.dogs || [];
      const upcoming = data.upcomingBookings || [];
      const recent = data.recentBookings || [];

      document.getElementById('stat-cards').innerHTML = `
        <div class="stat-card"><div class="icon">🐕</div><div class="label">My Dogs</div><div class="value">${dogs.length}</div></div>
        <div class="stat-card"><div class="icon">📅</div><div class="label">Upcoming Walks</div><div class="value">${upcoming.length}</div></div>
        <div class="stat-card"><div class="icon">✅</div><div class="label">Completed Walks</div><div class="value">${recent.length}</div></div>
      `;

      renderBookingList('upcoming-bookings', upcoming, 'upcoming');
      renderBookingList('recent-bookings', recent, 'recent');
    } catch (err) {
      showToast(err.message, 'error');
    }
  }

  function renderBookingList(containerId, bookings, type) {
    const el = document.getElementById(containerId);
    if (!bookings.length) {
      el.innerHTML = `<div class="empty-state"><div class="empty-icon">${type === 'upcoming' ? '📅' : '🎉'}</div>
        <h3>No ${type} walks</h3><p>${type === 'upcoming' ? 'Book your first walk!' : 'Complete a walk to see it here.'}</p>
        ${type === 'upcoming' ? '<a href="#book" class="btn btn-primary btn-sm">Book a Walk</a>' : ''}</div>`;
      return;
    }
    el.innerHTML = bookings.map(b => {
      const walkerName = b.walker ? `${b.walker.firstName} ${b.walker.lastName}` : 'Unassigned';
      const dogNames = (b.dogs || []).map(d => d.name).join(', ');
      const canReview = type === 'recent' && !b.review?.rating;
      const canTip = type === 'recent' && !b.tipAmount;
      return `
        <div class="booking-card">
          <div class="booking-card-header">
            <h4>${dogNames || 'Walk'}</h4>
            ${statusBadge(b.status)}
          </div>
          <div class="booking-meta">
            <span>📅 ${formatDate(b.scheduledDate)}</span>
            <span>🕐 ${formatTime(b.startTime)}</span>
            <span>🦮 ${walkerName}</span>
            <span>💰 ${formatCents(b.totalPrice)}</span>
            ${b.tipAmount ? `<span>💸 Tip: ${formatCents(b.tipAmount)}</span>` : ''}
          </div>
          ${b.review?.rating ? `<div class="mt-1 text-sm"><span class="review-stars">${starRating(b.review.rating)}</span> ${b.review.comment || ''}</div>` : ''}
          <div class="booking-actions">
            ${canTip ? `<button class="btn btn-sm btn-secondary" onclick="openTipModal('${b._id}', '${walkerName}')">💰 Tip</button>` : ''}
            ${canReview ? `<button class="btn btn-sm btn-secondary" onclick="openReviewModal('${b._id}', '${walkerName}')">⭐ Review</button>` : ''}
            ${b.status === 'pending' ? `<button class="btn btn-sm btn-danger" onclick="cancelBooking('${b._id}')">Cancel</button>` : ''}
          </div>
        </div>`;
    }).join('');
  }

  async function cancelBooking(id) {
    if (!confirmAction('Cancel this booking?')) return;
    try {
      await api(`/bookings/${id}/cancel`, { method: 'PATCH', body: { reason: 'Client cancelled' } });
      showToast('Booking cancelled', 'success');
      loadDashboard();
    } catch (err) { showToast(err.message, 'error'); }
  }

  // ── Dogs ──────────────────────────────────────
  let allDogs = [];

  async function loadDogs() {
    try {
      const data = await api('/clients/dogs');
      allDogs = data.dogs || [];
      renderDogList();
    } catch (err) { showToast(err.message, 'error'); }
  }

  function renderDogList() {
    const el = document.getElementById('dog-list');
    if (!allDogs.length) {
      el.innerHTML = `<div class="empty-state"><div class="empty-icon">🐶</div><h3>No dogs yet</h3><p>Add your first furry friend!</p>
        <button class="btn btn-primary btn-sm" onclick="showAddDogForm()">+ Add Dog</button></div>`;
      return;
    }
    el.innerHTML = allDogs.map(d => `
      <div class="dog-card">
        <div class="dog-avatar">🐕</div>
        <h4>${d.name}</h4>
        <div class="dog-info">${d.breed || 'Mixed'} · ${d.size} · ${d.age ? d.age + ' yrs' : ''} ${d.weight ? '· ' + d.weight + ' lbs' : ''}</div>
        ${d.specialInstructions ? `<div class="text-sm text-muted mt-1">${d.specialInstructions}</div>` : ''}
        <div class="dog-actions">
          <button class="btn btn-ghost btn-sm" onclick='editDog(${JSON.stringify(d)})'>Edit</button>
          <button class="btn btn-ghost btn-sm" style="color:var(--danger)" onclick="deleteDog('${d._id}')">Delete</button>
        </div>
      </div>
    `).join('');
  }

  function showAddDogForm() {
    document.getElementById('add-dog-form').style.display = 'block';
    document.getElementById('dog-form-title').textContent = 'Add a Dog';
    document.getElementById('edit-dog-id').value = '';
    ['dog-name','dog-breed','dog-size','dog-age','dog-weight','dog-gender','dog-instructions','dog-medical'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.value = '';
    });
  }
  function hideAddDogForm() { document.getElementById('add-dog-form').style.display = 'none'; }

  function editDog(d) {
    showAddDogForm();
    document.getElementById('dog-form-title').textContent = 'Edit Dog';
    document.getElementById('edit-dog-id').value = d._id;
    document.getElementById('dog-name').value = d.name || '';
    document.getElementById('dog-breed').value = d.breed || '';
    document.getElementById('dog-size').value = d.size || '';
    document.getElementById('dog-age').value = d.age || '';
    document.getElementById('dog-weight').value = d.weight || '';
    document.getElementById('dog-gender').value = d.gender || '';
    document.getElementById('dog-instructions').value = d.specialInstructions || '';
    document.getElementById('dog-medical').value = d.medicalConditions || '';
  }

  async function saveDog() {
    const body = {
      name: document.getElementById('dog-name').value,
      breed: document.getElementById('dog-breed').value,
      size: document.getElementById('dog-size').value,
      age: parseInt(document.getElementById('dog-age').value) || undefined,
      weight: parseInt(document.getElementById('dog-weight').value) || undefined,
      gender: document.getElementById('dog-gender').value || undefined,
      specialInstructions: document.getElementById('dog-instructions').value,
      medicalConditions: document.getElementById('dog-medical').value,
    };
    if (!body.name || !body.size) { showToast('Name and size are required', 'error'); return; }

    const editId = document.getElementById('edit-dog-id').value;
    try {
      if (editId) {
        await api(`/clients/dogs/${editId}`, { method: 'PATCH', body });
        showToast('Dog updated!', 'success');
      } else {
        await api('/clients/dogs', { method: 'POST', body });
        showToast('Dog added!', 'success');
      }
      hideAddDogForm();
      loadDogs();
      loadBookingDogSelect();
    } catch (err) { showToast(err.message, 'error'); }
  }

  async function deleteDog(id) {
    if (!confirmAction('Remove this dog?')) return;
    try {
      await api(`/clients/dogs/${id}`, { method: 'DELETE' });
      showToast('Dog removed', 'success');
      loadDogs();
      loadBookingDogSelect();
    } catch (err) { showToast(err.message, 'error'); }
  }

  // ── Booking dog select ────────────────────────
  async function loadBookingDogSelect() {
    const el = document.getElementById('booking-dog-select');
    try {
      const data = await api('/clients/dogs');
      const dogs = data.dogs || [];
      if (!dogs.length) {
        el.innerHTML = '<p class="text-muted">Add a dog first! <a href="#dogs">Go to My Dogs</a></p>';
        return;
      }
      el.innerHTML = dogs.map(d => `
        <label style="display:flex;align-items:center;gap:10px;padding:8px 0;cursor:pointer;">
          <input type="checkbox" class="booking-dog-cb" value="${d._id}" checked>
          <span>🐕 <strong>${d.name}</strong> — ${d.breed || 'Mixed'} · ${d.size}</span>
        </label>
      `).join('');
      updateBookingPrice();
      document.querySelectorAll('.booking-dog-cb').forEach(cb => cb.addEventListener('change', updateBookingPrice));
    } catch (err) { el.innerHTML = '<p class="text-muted">Error loading dogs.</p>'; }
  }

  function updateBookingPrice() {
    const count = document.querySelectorAll('.booking-dog-cb:checked').length;
    const price = 2000 + Math.max(0, count - 1) * 500;
    document.getElementById('book-btn').textContent = `Confirm Booking — ${formatCents(price)}`;
  }

  async function doBooking() {
    const dogIds = [...document.querySelectorAll('.booking-dog-cb:checked')].map(cb => cb.value);
    try {
      const booking = await submitBooking(dogIds);
      if (booking) {
        location.hash = 'overview';
        loadDashboard();
      }
    } catch (err) { /* already shown by submitBooking */ }
  }

  // ── Payment history ───────────────────────────
  async function loadPaymentHistory() {
    const el = document.getElementById('payment-history');
    try {
      const data = await api('/clients/payment-history');
      const payments = data.payments || [];
      if (!payments.length) {
        el.innerHTML = '<div class="empty-state"><div class="empty-icon">💳</div><h3>No payments yet</h3></div>';
        return;
      }
      el.innerHTML = `<table><thead><tr><th>Date</th><th>Type</th><th>Amount</th><th>Status</th></tr></thead><tbody>
        ${payments.map(p => `<tr>
          <td>${formatDate(p.createdAt)}</td>
          <td>${p.type === 'tip' ? '💸 Tip' : '🐾 Walk'}</td>
          <td>${formatCents(p.amount)}</td>
          <td>${statusBadge(p.status)}</td>
        </tr>`).join('')}
      </tbody></table>`;
    } catch (err) { el.innerHTML = '<p class="text-muted">Error loading payments.</p>'; }
  }
</script>
</body>
</html>
