<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Find Walkers — Wag &amp; Walk</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a href="/" class="logo">🐾 Wag &amp; Walk</a>
    <div class="nav-links" id="nav-links">
      <a href="/walkers" style="color:var(--amber);font-weight:600;">Find Walkers</a>
      <a href="/login">Log In</a>
      <a href="/register" class="btn btn-nav">Get Started</a>
    </div>
    <button class="nav-toggle" onclick="document.getElementById('nav-links').classList.toggle('open')">☰</button>
  </div>
</nav>

<section class="section">
  <div class="section-inner">
    <div class="section-label">Naperville's finest</div>
    <h2 class="section-title">Meet Our Walkers</h2>

    <div class="filter-bar">
      <input type="text" id="search-input" placeholder="Search walkers…" oninput="filterWalkers()">
      <select id="rating-filter" onchange="filterWalkers()">
        <option value="">All Ratings</option>
        <option value="4.5">4.5+ Stars</option>
        <option value="4">4+ Stars</option>
      </select>
    </div>

    <div id="walker-list"><div class="spinner"></div></div>
  </div>
</section>

<footer class="footer">
  <div class="footer-bottom"><p>© 2025 Wag &amp; Walk. All rights reserved. | Naperville, Illinois</p></div>
</footer>

<script src="/js/auth.js"></script>
<script>
  let walkers = [];

  async function loadWalkers() {
    try {
      const res = await fetch('/api/walkers?available=true');
      const data = await res.json();
      walkers = data.walkers || [];
      renderWalkers(walkers);
    } catch (err) {
      document.getElementById('walker-list').innerHTML = '<p class="text-muted">Error loading walkers.</p>';
    }
  }

  function renderWalkers(list) {
    const el = document.getElementById('walker-list');
    if (!list.length) {
      el.innerHTML = '<div class="empty-state"><div class="empty-icon">🦮</div><h3>No walkers found</h3><p>Try adjusting your filters.</p></div>';
      return;
    }
    el.innerHTML = `<div class="walker-grid">${list.map(w => {
      const initials = (w.firstName?.[0] || '') + (w.lastName?.[0] || '');
      const wp = w.walkerProfile || {};
      const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
      const availDays = (wp.availability || []).map(a => days[a.dayOfWeek]).join(', ');
      return `
        <div class="walker-card">
          <div class="walker-avatar">${initials}</div>
          <h3>${w.firstName} ${w.lastName}</h3>
          <div class="walker-rating">⭐ ${(wp.averageRating||0).toFixed(1)} · ${wp.totalWalks||0} walks</div>
          <p class="walker-bio">${wp.bio || 'Passionate dog walker in Naperville.'}</p>
          ${wp.experience ? `<p class="text-xs text-muted">${wp.experience}</p>` : ''}
          ${availDays ? `<p class="walker-avail mt-1">📅 ${availDays}</p>` : ''}
          <a href="/register?role=client" class="btn btn-primary btn-sm btn-full mt-2">Book ${w.firstName}</a>
        </div>`;
    }).join('')}</div>`;
  }

  function filterWalkers() {
    const search = document.getElementById('search-input').value.toLowerCase();
    const minRating = parseFloat(document.getElementById('rating-filter').value) || 0;
    const filtered = walkers.filter(w => {
      const name = `${w.firstName} ${w.lastName}`.toLowerCase();
      const bio = (w.walkerProfile?.bio || '').toLowerCase();
      const matchSearch = !search || name.includes(search) || bio.includes(search);
      const matchRating = (w.walkerProfile?.averageRating || 0) >= minRating;
      return matchSearch && matchRating;
    });
    renderWalkers(filtered);
  }

  loadWalkers();
</script>
</body>
</html>
