<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In — Wag & Walk</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<div class="auth-page">

  <div class="auth-visual">
    <div class="auth-visual-content">
      <h2>Welcome back</h2>
      <p>Your pups are waiting. Log in to manage your walks and connect with trusted walkers across Naperville.</p>
    </div>
  </div>

  <div class="auth-form-wrap">
    <a href="/" class="logo" style="margin-bottom:40px;display:flex;">
      <span class="logo-mark"><svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M4.5 9.5C5.5 5.5 8.5 3 12 3c3.5 0 6.5 2.5 7.5 6.5.5 2-.5 4-2 5l-1 3.5c-.3 1-1.2 1.5-2.2 1.5h-4.6c-1 0-1.9-.5-2.2-1.5l-1-3.5c-1.5-1-2.5-3-2-5z"/></svg></span>
      Wag & Walk
    </a>
    <h1>Log in</h1>
    <p class="subtitle">Enter your credentials to continue.</p>

    <div id="alert-box"></div>

    <form id="login-form">
      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" placeholder="you@example.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary btn-full" id="submit-btn">Log In</button>
    </form>

    <div class="auth-footer">Don't have an account? <a href="/register">Sign up</a></div>
  </div>

</div>

<script>
  document.getElementById('login-form').addEventListener('submit', async (ev) => {
    ev.preventDefault();
    const btn = document.getElementById('submit-btn');
    btn.textContent = 'Logging in…'; btn.disabled = true;

    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email:    document.getElementById('email').value,
          password: document.getElementById('password').value,
        }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Login failed');

      localStorage.setItem('token', data.token);
      localStorage.setItem('user',  JSON.stringify(data.user));

      const role = data.user.role;
      if      (role === 'admin')  location.href = '/dashboard/admin';
      else if (role === 'walker') location.href = '/dashboard/walker';
      else                        location.href = '/dashboard/client';

    } catch (err) {
      document.getElementById('alert-box').innerHTML =
        '<div class="alert alert-error">' + err.message + '</div>';
      btn.textContent = 'Log In'; btn.disabled = false;
    }
  });
</script>
</body>
</html>
