<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browse Walkers — Wag &amp; Walk</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a href="/" class="logo">🐾 Wag &amp; Walk</a>
    <div class="nav-links" id="nav-links">
      <a href="/login">Log In</a>
      <a href="/register" class="btn btn-nav">Get Started</a>
    </div>
    <button class="nav-toggle" onclick="document.getElementById('nav-links').classList.toggle('open')">☰</button>
  </div>
</nav>

<div style="max-width:1200px;margin:0 auto;padding:48px 24px">
  <div style="margin-bottom:36px">
    <div class="section-label">Serving Naperville, IL</div>
    <h1 style="margin-bottom:10px">Find your dog's perfect walker</h1>
    <p style="font-size:1.05rem;max-width:560px">Browse trusted local walkers — all vetted community members. Filter by availability, rating, and more.</p>
  </div>

  <!-- Filters -->
  <div class="card mb-3" style="padding:18px 22px">
    <div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap">
      <div style="display:flex;align-items:center;gap:8px">
        <label style="font-size:.82rem;font-weight:600;color:var(--muted)">Rating:</label>
        <select id="filter-rating" onchange="applyFilters()"
          style="padding:7px 12px;border:1.5px solid var(--linen);border-radius:8px;font-family:var(--font-body);background:#fff">
          <option value="">Any</option>
          <option value="4.5">4.5+★</option>
          <option value="4">4.0+★</option>
        </select>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <label style="font-size:.82rem;font-weight:600;color:var(--muted)">Available on:</label>
        <select id="filter-day" onchange="applyFilters()"
          style="padding:7px 12px;border:1.5px solid var(--linen);border-radius:8px;font-family:var(--font-body);background:#fff">
          <option value="">Any day</option>
          <option value="0">Sunday</option>
          <option value="1">Monday</option>
          <option value="2">Tuesday</option>
          <option value="3">Wednesday</option>
          <option value="4">Thursday</option>
          <option value="5">Friday</option>
          <option value="6">Saturday</option>
        </select>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <label style="font-size:.82rem;font-weight:600;color:var(--muted)">Sort by:</label>
        <select id="filter-sort" onchange="applyFilters()"
          style="padding:7px 12px;border:1.5px solid var(--linen);border-radius:8px;font-family:var(--font-body);background:#fff">
          <option value="rating">Top Rated</option>
          <option value="walks">Most Walks</option>
        </select>
      </div>
      <span id="result-count" style="margin-left:auto;font-size:.82rem;color:var(--muted)"></span>
    </div>
  </div>

  <!-- Walker grid -->
  <div id="walker-grid" class="walker-grid">
    <div class="spinner"></div>
  </div>
</div>

<footer class="footer" style="margin-top:60px">
  <div class="footer-bottom"><p>© 2025 Wag &amp; Walk · Naperville, Illinois</p></div>
</footer>

<script src="/js/auth.js"></script>
<script>
let _allWalkers = [];

async function loadWalkers() {
  try {
    const res  = await fetch('/api/walkers?available=true');
    const data = await res.json();
    _allWalkers = data.walkers || [];
    applyFilters();
  } catch(e) {
    document.getElementById('walker-grid').innerHTML =
      '<p class="empty" style="color:var(--danger)">Could not load walkers. Please try again.</p>';
  }
}

function applyFilters() {
  const minRating = parseFloat(document.getElementById('filter-rating').value) || 0;
  const dayFilter = document.getElementById('filter-day').value;
  const sort      = document.getElementById('filter-sort').value;

  let list = _allWalkers.filter(w => {
    const rating = w.walkerProfile?.averageRating || 0;
    if (minRating && rating < minRating) return false;
    if (dayFilter !== '') {
      const hasDay = (w.walkerProfile?.availability || [])
        .some(a => a.dayOfWeek === parseInt(dayFilter));
      if (!hasDay) return false;
    }
    return true;
  });

  if (sort === 'rating') list.sort((a,b) => (b.walkerProfile?.averageRating||0) - (a.walkerProfile?.averageRating||0));
  if (sort === 'walks')  list.sort((a,b) => (b.walkerProfile?.totalWalks||0) - (a.walkerProfile?.totalWalks||0));

  document.getElementById('result-count').textContent =
    `${list.length} walker${list.length !== 1 ? 's' : ''} found`;

  renderWalkers(list);
}

function renderWalkers(walkers) {
  const el = document.getElementById('walker-grid');
  if (!walkers.length) {
    el.innerHTML = '<p class="empty" style="grid-column:1/-1">No walkers match your filters.</p>';
    return;
  }
  el.innerHTML = walkers.map(w => {
    const wp   = w.walkerProfile || {};
    const init = `${(w.firstName||'?')[0]}${(w.lastName||'')[0]}`.toUpperCase();
    return `
      <div class="walker-card">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">
          <div class="w-avatar">${init}</div>
          <div>
            <div class="w-name">${w.firstName} ${w.lastName}</div>
            <div style="font-size:.82rem;color:var(--muted)">${wp.age ? `Age ${wp.age} · ` : ''}Naperville, IL</div>
          </div>
          ${wp.averageRating >= 4.9 ? '<span class="badge badge-accepted" style="margin-left:auto">⭐ Top</span>' : ''}
        </div>

        <div class="w-meta">
          <span>⭐ ${wp.averageRating ? wp.averageRating.toFixed(1) : 'New'}</span>
          <span>🦮 ${wp.totalWalks || 0} walks</span>
          ${wp.ratingCount ? `<span>💬 ${wp.ratingCount} reviews</span>` : ''}
        </div>

        <p class="w-bio">${wp.bio || 'Passionate dog lover serving the Naperville community.'}</p>

        ${wp.experience ? `<p style="font-size:.78rem;color:var(--muted);margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden">${wp.experience}</p>` : ''}

        <div style="margin-bottom:14px">
          <div style="font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:5px">Available</div>
          <div class="avail-dots">${DAYS.map((day, i) => {
            const on = (wp.availability||[]).some(a => a.dayOfWeek === i);
            return `<div class="avail-dot${on?' on':''}" title="${day}">${day[0]}</div>`;
          }).join('')}</div>
        </div>

        <a href="/register?role=client" class="btn btn-primary btn-full">
          Book ${w.firstName}
        </a>
      </div>`;
  }).join('');
}

// Adjust nav if logged in
const _u = getUser();
if (_u) {
  const nl = document.getElementById('nav-links');
  nl.innerHTML = `<span style="color:var(--soil);font-weight:500">Hi, ${_u.firstName}!</span>
    <a href="${_u.role==='walker'?'/dashboard/walker':'/dashboard/client'}">Dashboard</a>
    <a href="#" onclick="logout()" style="color:var(--danger)">Log out</a>`;
}

loadWalkers();
</script>
</body>
</html>
